<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a4373">
    <title>Relatório Diário Máquinas - João Divino Barbosa ®</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary:#1a4373; --bg:#f0f2f5; --warning:#f39c12; --danger:#e74c3c; --success:#25d366; --dark-card: #2c3e50; --text-muted: #5a6e7c; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background:var(--bg); padding:12px; margin:0; padding-bottom: 40px; }
        .card { background:white; padding:18px; border-radius:18px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin-bottom:16px; border-left:6px solid var(--primary); }
        h2 { font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:800; }
        input, textarea, select { width:100%; padding:14px; margin-bottom:10px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; font-weight:600; outline: none; background: white; }
        .row { display:flex; gap:10px; }
        button { width:100%; padding:16px; border:none; border-radius:40px; font-weight:bold; font-size:15px; color:white; margin-bottom:8px; cursor:pointer; }
        .card-medicao { background: var(--dark-card); color: white; border-left-color: #1abc9c; }
        .card-medicao input { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; text-align: center; }
        .resumo-dia { background: #e0f2fe; border: 2px solid #0ea5e9; border-radius: 12px; padding: 15px; text-align: center; margin-top: 10px; }
        .hidden { display: none !important; }
        footer { text-align:center; font-size:10px; margin:20px; color:#94a3b8; font-weight: bold; }
    </style>
</head>
<body onload="carregarDados()">

<div style="text-align: center; margin-bottom: 15px;">
    <h1 style="color:var(--primary); font-size: 20px; margin:0;">Agro na Palma da Mão</h1>
    <small style="color:var(--text-muted)">João Divino Barbosa ®</small>
</div>

<div class="card">
    <h2>📋 1. IDENTIFICAÇÃO (OBRIGATÓRIO)</h2>
    <input id="fazenda" placeholder="Fazenda *">
    <input id="op" placeholder="Operador *">
    
    <div class="row">
        <select id="tipoMaq" style="flex:1.5">
            <option value="">Máquina *</option>
            <option value="Trator">Trator</option>
            <option value="Colheitadeira">Colhedeira</option>
            <option value="Pulverizador">Pulverizador</option>
            <option value="Escavadeira">Escavadeira</option>
        </select>
        <input id="numMaq" placeholder="Nº *" style="flex:1">
    </div>
</div>

<div id="painelHorimetro" class="card card-medicao">
    <h2>📊 2. HORÍMETRO</h2>
    <div class="row">
        <div style="flex:1">
            <span style="font-size:10px;">INICIAL</span>
            <input type="number" id="vI" step="0.1" oninput="calcular()">
        </div>
        <div style="flex:1">
            <span style="font-size:10px;">FINAL</span>
            <input type="number" id="vF" step="0.1" oninput="calcular()">
        </div>
    </div>
    <div style="text-align: center; margin-top: 10px;">
        <span id="totMaqVisual" style="font-size: 32px; font-weight: 900;">0.00</span>
    </div>
</div>

<div id="resumoDia" class="card resumo-dia hidden">
    <h2 style="color: #0369a1;">📅 TOTAL DE HORAS</h2>
    <span id="totalHorasDia" style="font-size: 28px; font-weight: 900;">0.00 Horas</span>
</div>

<div class="card">
    <h2>🛠️ 3. OBSERVAÇÕES</h2>
    <textarea id="justManut" placeholder="Descreva o serviço..." style="height:80px;"></textarea>
</div>

<div class="card">
    <h2>⏱️ 4. JORNADA</h2>
    <div class="row" style="text-align:center">
        <div style="flex:1"><label style="font-size:9px;">INÍCIO</label><input id="sIni" readonly style="border:none; text-align:center; background:none;"></div>
        <div style="flex:1"><label style="font-size:9px;">FIM</label><input id="sFim" readonly style="border:none; text-align:center; background:none;"></div>
    </div>
    <button style="background:var(--primary)" onclick="marcar('ini')">▶ Iniciar Trabalho</button>
    <button style="background:#475569" onclick="marcar('fim')">⏹️ Finalizar Trabalho</button>
</div>

<div class="card">
    <button style="background:var(--danger)" onclick="gerarPDF()">📄 GERAR PDF PROFISSIONAL</button>
    <button style="background:var(--success)" onclick="enviarWA()">📱 WHATSAPP</button>
    <button onclick="limparTudo()" style="background:#95a5a6; font-size:10px; padding:5px;">🔄 RESETAR DADOS</button>
</div>

<footer>Desenvolvido por João Divino Barbosa ®</footer>

<script>
// FUNÇÃO DA TRAVA
function validar() {
    let f = document.getElementById('fazenda').value.trim();
    let o = document.getElementById('op').value.trim();
    let t = document.getElementById('tipoMaq').value;
    let n = document.getElementById('numMaq').value.trim();

    if (!f || !o || !t || !n) {
        alert("🚨 ATENÇÃO: Preencha a Fazenda, Operador e os dados da Máquina primeiro!");
        return false;
    }
    return true;
}

function salvar() {
    let obj = {
        fazenda: document.getElementById('fazenda').value,
        op: document.getElementById('op').value,
        tipoMaq: document.getElementById('tipoMaq').value,
        numMaq: document.getElementById('numMaq').value,
        vI: document.getElementById('vI').value,
        vF: document.getElementById('vF').value,
        sIni: document.getElementById('sIni').value,
        sFim: document.getElementById('sFim').value,
        justManut: document.getElementById('justManut').value
    };
    localStorage.setItem('agro_v20', JSON.stringify(obj));
}

// Salva automaticamente ao digitar
document.querySelectorAll('input, select, textarea').forEach(el => {
    el.addEventListener('input', salvar);
});

function carregarDados() {
    let s = JSON.parse(localStorage.getItem('agro_v20') || '{}');
    document.getElementById('fazenda').value = s.fazenda || '';
    document.getElementById('op').value = s.op || '';
    document.getElementById('tipoMaq').value = s.tipoMaq || '';
    document.getElementById('numMaq').value = s.numMaq || '';
    document.getElementById('vI').value = s.vI || '';
    document.getElementById('vF').value = s.vF || '';
    document.getElementById('sIni').value = s.sIni || '';
    document.getElementById('sFim').value = s.sFim || '';
    document.getElementById('justManut').value = s.justManut || '';
    calcular();
}

function marcar(t) {
    if (!validar()) return; // TRAVA AQUI
    let agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(t === 'ini') document.getElementById('sIni').value = agora;
    else document.getElementById('sFim').value = agora;
    salvar();
}

function calcular() {
    let hI = parseFloat(document.getElementById('vI').value) || 0;
    let hF = parseFloat(document.getElementById('vF').value) || 0;
    let total = Math.max(0, hF - hI);
    document.getElementById('totMaqVisual').innerText = total.toFixed(2);
    document.getElementById('totalHorasDia').innerText = total.toFixed(2) + " Horas";
    if(hF > 0) document.getElementById('resumoDia').classList.remove('hidden');
    else document.getElementById('resumoDia').classList.add('hidden');
    salvar();
}

function gerarPDF() {
    if (!validar()) return; // TRAVA AQUI
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("RELATÓRIO DE MÁQUINA", 10, 20);
    doc.setFontSize(12);
    doc.text(`Fazenda: ${document.getElementById('fazenda').value}`, 10, 40);
    doc.text(`Operador: ${document.getElementById('op').value}`, 10, 50);
    doc.text(`Máquina: ${document.getElementById('tipoMaq').value} - ${document.getElementById('numMaq').value}`, 10, 60);
    doc.text(`Horímetro: ${document.getElementById('vI').value} até ${document.getElementById('vF').value}`, 10, 70);
    doc.text(`Total: ${document.getElementById('totalHorasDia').innerText}`, 10, 80);
    doc.save(`Relatorio_${document.getElementById('fazenda').value}.pdf`);
}

function enviarWA() {
    if (!validar()) return; // TRAVA AQUI
    let msg = `*AGRO - ${document.getElementById('fazenda').value}*\n🚜 ${document.getElementById('tipoMaq').value} (${document.getElementById('numMaq').value})\n⏱️ Total: ${document.getElementById('totalHorasDia').innerText}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

function limparTudo() { 
    if(confirm("Deseja resetar o relatório atual?")) { 
        localStorage.clear(); 
        location.reload(); 
    } 
}
</script>
</body>
</html>
