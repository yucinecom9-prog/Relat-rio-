<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSystem Pro - Relatório Diário</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background-color: #f4f4f4; }
        .container { background: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2e7d32; }
        
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 15px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: #fff; }
        .btn-enviar { background-color: #2e7d32; }
        .btn-limpar { background-color: #d32f2f; }

        /* Estilo do Relatório para o envio/impressão */
        #printArea { display: none; }
        .relatorio-formatado { font-family: Courier, monospace; padding: 10px; border: 1px solid #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>AGRO SYSTEM PRO</h2>
    
    <div class="campo">
        <label>FAZENDA:</label>
        <input type="text" id="fazenda" placeholder="Nome da Fazenda">
    </div>
    
    <div class="campo">
        <label>MÁQUINA:</label>
        <input type="text" id="maquina" placeholder="Ex: Colheitadeira 09">
    </div>
    
    <div class="campo">
        <label>OPERADOR:</label>
        <input type="text" id="operador" placeholder="Seu nome">
    </div>
    
    <div class="campo">
        <label>TOTAL DE HORAS:</label>
        <input type="number" step="0.01" id="horas" placeholder="0.00">
    </div>

    <div class="btn-container">
        <button class="btn-enviar" onclick="processarRelatorio()">GERAR E ENVIAR RELATÓRIO</button>
        <button class="btn-limpar" onclick="limpar()">LIMPAR TUDO</button>
    </div>
</div>

<script>
    function processarRelatorio() {
        // Captura dos dados
        const fazenda = document.getElementById('fazenda').value.trim();
        const maquina = document.getElementById('maquina').value.trim();
        const operador = document.getElementById('operador').value.trim();
        const horas = document.getElementById('horas').value.trim();

        // TRAVA DE SEGURANÇA: Não deixa passar se o cabeçalho estiver vazio
        if (fazenda === "" || maquina === "" || operador === "" || horas === "") {
            alert("ERRO: Preencha todos os dados! Não é possível gerar o relatório sem o nome da Fazenda, Máquina ou Operador.");
            return;
        }

        // Formatação do Texto para o WhatsApp (Mantendo seu estilo)
        const mensagem = 
            `*RELATÓRIO DIÁRIO AGRO*\n` +
            `*FAZENDA:* ${fazenda.toUpperCase()}\n` +
            `*MAQUINA:* ${maquina.toUpperCase()}\n` +
            `*OPERADOR:* ${operador.toUpperCase()}\n` +
            `*TOTAL DE HORAS:* ${parseFloat(horas).toFixed(2)} Horas`;

        // Comando para abrir o WhatsApp
        const url = "https://wa.me/?text=" + encodeURIComponent(mensagem);
        window.open(url, "_blank");
    }

    function limpar() {
        if(confirm("Deseja limpar os campos?")) {
            document.getElementById('fazenda').value = "";
            document.getElementById('maquina').value = "";
            document.getElementById('operador').value = "";
            document.getElementById('horas').value = "";
        }
    }
</script>

</body>
</html>
