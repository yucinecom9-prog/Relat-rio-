<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a4373">
    <title>Relatório Diário Máquinas - João Divino Barbosa ®</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary:#1a4373; --bg:#f0f2f5; --warning:#f39c12; --danger:#e74c3c; --success:#25d366; --dark-card: #2c3e50; --text-muted: #5a6e7c; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background:var(--bg); padding:12px; margin:0; padding-bottom: 40px; }
        .card { background:white; padding:18px; border-radius:18px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin-bottom:16px; border-left:6px solid var(--primary); }
        h2 { font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:800; }
        input, textarea, select { width:100%; padding:14px; margin-bottom:10px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; font-weight:600; outline: none; background: white; }
        .row { display:flex; gap:10px; }
        button { width:100%; padding:16px; border:none; border-radius:40px; font-weight:bold; font-size:15px; color:white; margin-bottom:8px; cursor:pointer; }
        
        .card-medicao { background: var(--dark-card); color: white; border-left-color: #1abc9c; transition: 0.3s; }
        .card-medicao.proximo { background: #d35400 !important; border-left-color: #f1c40f !important; }
        .card-medicao.vencido { background: #c0392b !important; border-left-color: #ffffff !important; animation: pulse 1.5s infinite; }
        
        .card-medicao input { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px; text-align: center; }
        .hidden { display: none !important; }
        .status-emergencia { background: #fff5f5; border: 1px solid #ff0000; padding: 10px; border-radius: 8px; font-size: 12px; color: #b91c1c; text-align: center; margin-bottom: 10px; font-weight: 800; }
        footer { text-align:center; font-size:10px; margin:20px; color:#94a3b8; font-weight: bold; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(192, 57, 43, 0); } 100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); } }
    </style>
</head>
<body onload="carregarDados()">

<div style="text-align: center; margin-bottom: 15px;">
    <h1 style="color:var(--primary); font-size: 20px; margin:0;">Agro na Palma da Mão</h1>
    <small style="color:var(--text-muted)">Desenvolvido por João Divino Barbosa ®</small>
</div>

<div class="card">
    <h2>📋 1. IDENTIFICAÇÃO E REVISÃO</h2>
    <input id="fazenda" placeholder="Fazenda *" oninput="salvar()">
    <input id="op" placeholder="Operador *" oninput="salvar()">
    <div class="row">
        <select id="tipoMaq" onchange="salvar()" style="flex:1.5">
            <option value="">Escolha a Máquina *</option>
            <option value="Trator">Trator</option>
            <option value="Colhedeira">Colhedeira</option>
            <option value="Escavadeira">Escavadeira</option>
            <option value="Pá Carregadeira">Pá Carregadeira</option>
            <option value="Pulverizador">Pulverizador</option>
        </select>
        <input id="numMaq" placeholder="Nº/Pref*" oninput="salvar()" style="flex:1">
    </div>
    <select id="tipoManut" onchange="salvar(); calcular()">
        <option value="0">Selecione a Revisão (Alvo) *</option>
        <option value="100">100 Horas</option>
        <option value="250">250 Horas</option>
        <option value="500">500 Horas</option>
        <option value="1000">1.000 Horas</option>
    </select>
</div>

<div id="painelHorimetro" class="card card-medicao">
    <h2>📊 2. HORÍMETRO & STATUS</h2>
    <div class="row">
        <div style="flex:1">
            <span style="font-size:10px;">INICIAL</span>
            <input type="number" id="vI" step="0.1" oninput="salvar(); calcular()">
        </div>
        <div style="flex:1">
            <span style="font-size:10px;">FINAL</span>
            <input type="number" id="vF" step="0.1" oninput="salvar(); calcular()">
        </div>
    </div>
    <div style="text-align: center; margin-top: 10px;">
        <span id="totMaqVisual" style="font-size: 32px; font-weight: 900;">0.00</span>
        <span id="statusManut" style="font-size:12px; font-weight:900; display:block; margin-top:5px;">SISTEMA OK</span>
    </div>
</div>

<div class="card">
    <h2>🛠️ 3. OBSERVAÇÕES E EMERGÊNCIA</h2>
    <div id="statusEmergencia" class="status-emergencia hidden">🚨 MÁQUINA EM PARADA DE EMERGÊNCIA</div>
    <textarea id="justManut" placeholder="Descreva o que foi feito..." oninput="salvar()" style="height:80px;"></textarea>
    <button id="btnParar" style="background:#d35400" onclick="acaoEmergencia('parar')">🚨 PARADA DE EMERGÊNCIA (M.N.P)</button>
    <button id="btnRetomar" style="background:var(--success); display:none;" onclick="acaoEmergencia('retomar')">✅ RETOMAR TRABALHO</button>
</div>

<div class="card">
    <h2>⏱️ 4. JORNADA DE TRABALHO</h2>
    <div class="row" style="text-align:center">
        <div style="flex:1"><label style="font-size:9px;">INÍCIO</label><input id="sIni" readonly style="border:none; text-align:center; background:none;"></div>
        <div style="flex:1"><label style="font-size:9px;">FIM</label><input id="sFim" readonly style="border:none; text-align:center; background:none;"></div>
    </div>
    <button style="background:var(--primary)" onclick="marcar('ini')">▶ Iniciar Trabalho</button>
    <button style="background:#475569" onclick="marcar('fim')">⏹️ Finalizar Trabalho</button>
</div>

<div class="card">
    <button id="btnPDF" style="background:var(--danger)" onclick="gerarPDF()">📄 GERAR PDF PROFISSIONAL</button>
    <button id="btnWA" style="background:var(--success)" onclick="enviarWA()">📱 ENVIAR WHATSAPP</button>
    <button onclick="limparTudo()" style="background:#95a5a6; font-size:10px;">🔄 RESETAR</button>
</div>

<footer>Desenvolvido por João Divino Barbosa ®</footer>

<script>
let dadosLogica = { emEmergencia: false };

function validarIdentificacao() {
    if(!fazenda.value || !op.value || !tipoMaq.value || !numMaq.value || tipoManut.value === "0") {
        alert("⚠️ PREENCHA OS DADOS: Você não pôs a máquina, a Fazenda nem nada!");
        return false;
    }
    return true;
}

function salvar() {
    let obj = {
        fazenda: fazenda.value, op: op.value, tipoMaq: tipoMaq.value, numMaq: numMaq.value, 
        tipoManut: tipoManut.value, vI: vI.value, vF: vF.value, sIni: sIni.value, 
        sFim: sFim.value, justManut: justManut.value, emEmergencia: dadosLogica.emEmergencia
    };
    localStorage.setItem('agro_vFinal_Divino', JSON.stringify(obj));
}

function carregarDados() {
    let s = JSON.parse(localStorage.getItem('agro_vFinal_Divino') || '{}');
    fazenda.value = s.fazenda || ''; op.value = s.op || '';
    tipoMaq.value = s.tipoMaq || ''; numMaq.value = s.numMaq || '';
    tipoManut.value = s.tipoManut || '0';
    vI.value = s.vI || ''; vF.value = s.vF || ''; sIni.value = s.sIni || ''; sFim.value = s.sFim || '';
    justManut.value = s.justManut || '';
    dadosLogica.emEmergencia = s.emEmergencia || false;

    if(dadosLogica.emEmergencia) {
        btnParar.style.display = 'none'; btnRetomar.style.display = 'block';
        statusEmergencia.classList.remove('hidden');
    }
    calcular();
}

function calcular() {
    let hI = parseFloat(vI.value) || 0;
    let hF = parseFloat(vF.value) || 0;
    let alvo = parseFloat(tipoManut.value) || 0;
    let total = Math.max(0, hF - hI);
    totMaqVisual.innerText = total.toFixed(2);

    painelHorimetro.classList.remove('proximo', 'vencido');
    statusManut.innerText = "SISTEMA OK";

    if(alvo > 0 && hF > 0) {
        let falta = alvo - hF;
        if(falta <= 0) {
            painelHorimetro.classList.add('vencido');
            statusManut.innerText = `🚨 REVISÃO VENCIDA HÁ ${Math.abs(falta).toFixed(1)}H`;
        } else if(falta <= 15) {
            painelHorimetro.classList.add('proximo');
            statusManut.innerText = `⚠️ ATENÇÃO: REVISÃO EM ${falta.toFixed(1)}H`;
        }
    }
}

function acaoEmergencia(tipo) {
    if(!validarIdentificacao()) return;
    let agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(tipo === 'parar') {
        justManut.value += `\n[PARADA DE EMERGÊNCIA ÀS ${agora}] `;
        dadosLogica.emEmergencia = true;
        btnParar.style.display = 'none'; btnRetomar.style.display = 'block';
        statusEmergencia.classList.remove('hidden');
    } else {
        justManut.value += `-> RETORNO ÀS ${agora}. `;
        dadosLogica.emEmergencia = false;
        btnRetomar.style.display = 'none'; btnParar.style.display = 'block';
        statusEmergencia.classList.add('hidden');
    }
    salvar();
}

function marcar(t) {
    if(!validarIdentificacao()) return;
    let agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(t === 'ini') sIni.value = agora;
    else sFim.value = agora;
    salvar();
}
function gerarPDF() {
    if(!vF.value || !sFim.value) { alert("Finalize o trabalho antes de gerar o PDF!"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // CABEÇALHO AZUL
    doc.setFillColor(26, 67, 115);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont("helvetica", "bold");
    doc.text("RELATÓRIO DIÁRIO DE MÁQUINAS", 105, 20, {align:"center"});

    // CORPO DO TEXTO
    doc.setTextColor(40, 40, 40);
    doc.setFontSize(12);
    doc.text("1. IDENTIFICAÇÃO", 20, 50);
    doc.line(20, 52, 190, 52);
    
    doc.setFont("helvetica", "normal");
    doc.text(`Fazenda: ${fazenda.value.toUpperCase()}`, 20, 60);
    doc.text(`Operador: ${op.value}`, 20, 70);
    doc.text(`Equipamento: ${tipoMaq.value} (Nº ${numMaq.value})`, 20, 80);

    doc.setFont("helvetica", "bold");
    doc.text("2. RENDIMENTO", 20, 100);
    doc.line(20, 102, 190, 102);
    
    doc.setFont("helvetica", "normal");
    doc.text(`Horímetro: ${vI.value} até ${vF.value}`, 20, 112);
    doc.setFont("helvetica", "bold");
    doc.text(`TOTAL DE HORAS TRABALHADAS: ${totMaqVisual.innerText} h`, 20, 122);

    // --- CORREÇÃO DO ALERTA (SEM EMOJI PARA NÃO BUGAR) ---
    let hF = parseFloat(vF.value) || 0;
    let alvo = parseFloat(tipoManut.value) || 0;
    
    if (alvo > 0 && hF >= alvo) {
        let ultrapassado = (hF - alvo).toFixed(1);
        doc.setTextColor(200, 0, 0); // Vermelho
        doc.setFontSize(14);
        // Usamos apenas texto, sem a sirene que buga o PDF
        doc.text(`ALERTA: MANUTENÇÃO VENCIDA HÁ ${ultrapassado}H`, 20, 135);
        doc.setTextColor(40, 40, 40);
        doc.setFontSize(12);
    } else if (alvo > 0 && (alvo - hF) <= 15) {
        let falta = (alvo - hF).toFixed(1);
        doc.setTextColor(211, 84, 0); // Laranja
        doc.text(`AVISO: REVISÃO PRÓXIMA EM ${falta}H`, 20, 135);
        doc.setTextColor(40, 40, 40);
    }

    doc.setFont("helvetica", "normal");
    doc.text(`Jornada: ${sIni.value} às ${sFim.value}`, 20, 150);
    
    doc.setFont("helvetica", "bold");
    doc.text("3. OBSERVAÇÕES / OCORRÊNCIAS", 20, 170);
    doc.line(20, 172, 190, 172);
    doc.setFont("helvetica", "normal");
    const splitObs = doc.splitTextToSize(justManut.value || "Nenhuma ocorrência.", 170);
    doc.text(splitObs, 20, 180);

    // RODAPÉ
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text(`Gerado por Agro na Palma da Mão - João Divino Barbosa ®`, 105, 285, {align:"center"});

    doc.save(`Relatorio_${numMaq.value}_${fazenda.value}.pdf`);
}



function enviarWA() {
    if(!vF.value) { alert("Preencha os dados primeiro!"); return; }
    let hF = parseFloat(vF.value);
    let alvo = parseFloat(tipoManut.value);
    let statusWA = "✅ MÁQUINA EM DIA";
    if(alvo > 0 && hF >= alvo) statusWA = `🚨 *REVISÃO VENCIDA HÁ ${Math.abs(alvo-hF).toFixed(1)}H*`;
    else if(alvo > 0 && (alvo-hF) <= 15) statusWA = `⚠️ *REVISÃO EM ${Math.abs(alvo-hF).toFixed(1)}H*`;

    let texto = `*🚜 RELATÓRIO DIÁRIO AGRO*%0A*__________________________*%0A%0A*📍 IDENTIFICAÇÃO*%0A• *Fazenda:* ${fazenda.value.toUpperCase()}%0A• *Máquina:* ${tipoMaq.value} (${numMaq.value})%0A%0A*📊 RENDIMENTO*%0A• *Horas:* ${vI.value} às ${vF.value}%0A➡️ *TOTAL:* ${totMaqVisual.innerText} h%0A%0A*🛠️ MANUTENÇÃO*%0A${statusWA}%0A%0A*📝 OBS:* ${justManut.value || 'Nenhuma.'}`;

    window.open(`https://wa.me/?text=${texto}`);
}

function limparTudo() {
    if(confirm("Deseja resetar?")) { localStorage.clear(); location.reload(); }
}
</script>
</body>
</html>
